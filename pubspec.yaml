name: hilway
description: A mental health companion app for Filipino nursing students.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.0.0-dev.3
  riverpod_annotation: ^3.0.0-dev.3

  # Icons
  phosphor_flutter: ^2.1.0

  # Navigation
  go_router: ^17.2.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.0.0

  # Cloud Backend
  supabase_flutter: ^2.8.1

  # AI Chatbot
  google_generative_ai: ^0.4.7

  # HTTP Client
  dio: ^5.7.0

  # Charts
  fl_chart: ^1.2.0

  # Notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  
  # Calendar UI
  table_calendar: ^3.1.2

  # Fonts
  google_fonts: ^8.0.2

  # TFLite

  # Health & Fitness Sync
  health: ^13.3.1

  # Audio
  audioplayers: ^6.1.0

  # Utilities
  flutter_svg: ^2.0.10
  flutter_dotenv: ^6.0.0
  uuid: ^4.5.1
  intl: ^0.20.2
  shared_preferences: ^2.3.3
  connectivity_plus: ^7.1.1
  path_provider: ^2.1.5
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^3.0.0-dev.11
  riverpod_lint: ^3.0.0-dev.4
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/models/
    - assets/images/
    - assets/images/schools/
    - assets/audio/
    - assets/emoji/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/hilway_logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true